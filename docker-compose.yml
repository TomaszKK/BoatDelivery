services:
  postgres:
    image: postgres:18.3
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  eureka:
    build: ./eurekaServer
    container_name: eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    command: start-dev --import-realm
    ports:
      - "8060:8060"
    volumes:
      - ./docker/keycloak/imports:/opt/keycloak/data/import
      - ./docker/keycloak/providers:/opt/keycloak/providers
      - ./docker/keycloak/themes/boat-theme:/opt/keycloak/themes/boat-theme
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"           # Włącza nasłuchiwanie na HTTP (nie tylko HTTPS)
      KC_HOSTNAME_STRICT: "false"       # Pozwala Keycloakowi akceptować localhost i nazwy serwisów dockera
      KC_HOSTNAME_STRICT_HTTPS: "false" # Pozwala na panel admina po HTTP
      KC_HTTP_RELATIVE_PATH: "/"
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8060
      KC_EVENTS_ENABLED: "true"         # Włącza zapisywanie eventów
      KC_EVENTS_LISTENERS: "userservice-sync-listener"  # Rejestruje nasz custom listener
      KC_ADMIN_EVENTS_ENABLED: "true"   # Włącza zapisywanie admin eventów
      KC_ADMIN_EVENTS_DETAILS_ENABLED: "true"  # Włącza szczegóły admin eventów
      WEBHOOK_KEYCLOAK_SECRET: c8d904f5-5322-4d56-affb-fe63b9c436fb
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/8060'"]
      interval: 10s
      timeout: 5s
      retries: 15

  gateway:
    build: ./springGateway
    container_name: gateway
    ports:
      - "8080:8080"
    env_file:
      - ./springGateway/.env.docker
    depends_on:
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  user-service:
    build: ./userService
    container_name: user-service
    expose:
      - "8081"
    env_file:
      - ./userService/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    expose:
      - "8082"
    env_file:
      - ./order-service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  notification-service:
    build: ./notifi-service
    container_name: notification-service
    expose:
      - "8083"
    env_file:
      - ./notifi-service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy

  front:
#   OPTION 1: DEV MODE
    image: node:25.8.1
    working_dir: /app
    volumes:
      - ./front:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      gateway:
        condition: service_started
#     OPTION 2: PROD MODE
#     build: ./front
#     container_name: front-app
#     ports:
#       - "5173:80"
#     depends_on:
#       gateway:
#         condition: service_started

  payment-service:
    build: ./payment-service
    container_name: payment-service
    expose:
      - "8084"
    env_file:
      - ./payment-service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: stripe-cli-forwarder
    env_file:
      - ./payment-service/.env.docker
    command: listen --forward-to http://payment-service:8084/api/payments/webhook
    depends_on:
      - payment-service
    restart: unless-stopped

volumes:
  postgres_data:
