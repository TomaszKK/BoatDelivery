services:
  postgres:
    image: postgres:18.3
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  eureka:
    build: ./eurekaServer
    container_name: eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    command: start-dev --import-realm
    ports:
      - "8060:8080"
    volumes:
      - ./docker/keycloak/imports:/opt/keycloak/data/import
      - ./keycloak-spi/target:/opt/keycloak/providers
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 15

  gateway:
    build: ./springGateway
    container_name: gateway
    expose:
      - "8080"
    ports:
      - "8080:8080"
    env_file:
      - ./springGateway/.env
    depends_on:
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  user-service:
    build: ./userService
    container_name: user-service
    expose:
      - "8081"
    env_file:
      - ./userService/.env
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    expose:
      - "8082"
    env_file:
      - ./order-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  notification-service:
    build: ./notifi-service
    container_name: notification-service
    expose:
      - "8083"
    env_file:
      - ./notifi-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy

  front:
    image: node:25.8.1
    working_dir: /app
    volumes:
      - ./front:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data: