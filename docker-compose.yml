services:
  postgres:
    image: postgres:17
    container_name: boatdelivery-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service_db

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: local-keycloak
    ports:
      - "8060:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./docker/keycloak/providers:/opt/keycloak/providers
      - ./docker/keycloak/imports:/opt/keycloak/data/import
    command: start-dev --import-realm
    
  rabbitmq:
    image: rabbitmq:3-management
    container_name: boatdelivery-rabbitmq
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
