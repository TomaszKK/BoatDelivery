server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:5173" # Otwarte dla deweloperskiego ?rodowiska Vite
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
          routes:
            - id: worker-route
              uri: lb://worker-service
              predicates:
                - Path=/api/production/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka