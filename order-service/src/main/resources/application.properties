quarkus.application.name=order-service
quarkus.http.port=8082

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/order_service_db
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql


# Polaczenie z Rabbitem
rabbitmq-host=host.docker.internal
rabbitmq-port=5672
rabbitmq-username=admin
rabbitmq-password=admin

# Konfiguracja kanalu order-events
mp.messaging.outgoing.order-events.connector=smallrye-rabbitmq
mp.messaging.outgoing.order-events.exchange.name=boatdelivery.exchange
mp.messaging.outgoing.order-events.exchange.type=topic
mp.messaging.outgoing.order-events.exchange.declare=false

# Konfiguracja kanalu payment-in
mp.messaging.incoming.payment-in.connector=smallrye-rabbitmq
mp.messaging.incoming.payment-in.exchange.name=payment_exchange
mp.messaging.incoming.payment-in.exchange.type=topic
mp.messaging.incoming.payment-in.routing-keys=payment.completed
mp.messaging.incoming.payment-in.queue.name=order.payment.queue
mp.messaging.incoming.payment-in.auto-bind=true

app.security.enabled=true

quarkus.security.auth.enabled=${app.security.enabled}
quarkus.oidc.tenant-enabled=${app.security.enabled}

# Podstawowa konfiguracja OIDC
quarkus.oidc.application-type=service
quarkus.oidc.auth-server-url=http://keycloak:8060/realms/boat-delivery-realm
quarkus.oidc.token.issuer=http://localhost:8060/realms/boat-delivery-realm
quarkus.oidc.tls.verification=none
quarkus.oidc.discovery-enabled=false
quarkus.oidc.jwks-path=http://keycloak:8060/realms/boat-delivery-realm/protocol/openid-connect/certs

# Wy??czenie proaktywnej autentykacji - @PermitAll b?dzie dost?pny bez tokenu
quarkus.http.auth.proactive=false
# Nie wymagaj autentykacji dla endpointów bez anotacji bezpiecze?stwa
quarkus.security.jaxrs.deny-unannotated-endpoints=false

app.host.name=localhost
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

google.api.key=
here.api.key=

quarkus.rest-client.google-maps-api.url=https://maps.googleapis.com
quarkus.rest-client.here-geocode-api.url=https://geocode.search.hereapi.com

quarkus.timefold.solver.termination.spent-limit=20s

user-service/mp-rest/url=http://user-service:8081

internal.api.secret=c8d904f5-5322-4d56-affb-fe63b9c436fb

# Debug logi dla Quarkus Security
quarkus.log.level=DEBUG
quarkus.log.category."io.quarkus.security".level=DEBUG
quarkus.log.category."io.quarkus.oidc".level=DEBUG
quarkus.log.category."io.quarkus.security.runtime.QuarkusSecurityIdentityProvider".level=DEBUG
quarkus.log.category."p.lodz.pl".level=DEBUG
