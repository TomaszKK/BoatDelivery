server.port=8081
spring.application.name=user-service
app.security.enabled=true

# LOKALNE WARTOSCI
spring.datasource.url=jdbc:postgresql://localhost:5432/user_service_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true
spring.flyway.clean-on-validation-error=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.client.enabled=true

logging.level.root=INFO
logging.level.pl.dmcs.userservice=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8060/realms/boat-delivery-realm/protocol/openid-connect/certs

# Webhook konfiguracja
app.webhook.keycloak-secret=c8d904f5-5322-4d56-affb-fe63b9c436fb

# Synchronizacja - LOCAL DEV MODE
app.sync.enabled=true
app.sync.environment=test-dev
app.sync.migrate-on-startup=false
app.sync.default-password=password123
app.sync.keycloak-admin-url=http://localhost:8060
app.sync.keycloak-admin-username=admin
app.sync.keycloak-admin-password=admin
app.sync.keycloak-realm=boat-delivery-realm
app.sync.keycloak-client-id=admin-cli
app.sync.audit-conflicts=true


